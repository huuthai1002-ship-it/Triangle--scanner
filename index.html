<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Triangle Scanner AUTO</title>
<style>
body{background:#0b0f18;color:#e6f0ff;font-family:monospace;padding:20px}
button{padding:10px 16px;margin:10px 0;cursor:pointer}
#log{white-space:pre-wrap;margin-top:10px;font-size:13px}
</style>
</head>
<body>

<h2>🚀 Triangle Scanner AUTO (200+ coin)</h2>

<button onclick="startScan()">▶ SCAN ALL FUTURES</button>

<pre id="log"></pre>

<script>

// ===== LOAD ALL FUTURES =====
async function loadSymbols(){
  const res = await fetch("https://fapi.binance.com/fapi/v1/exchangeInfo");
  const data = await res.json();

  return data.symbols
    .filter(s => s.quoteAsset === "USDT" && s.contractType === "PERPETUAL")
    .map(s => s.symbol);
}

// ===== FETCH =====
async function fetchKlines(symbol){
  const url = `https://fapi.binance.com/fapi/v1/klines?symbol=${symbol}&interval=30m&limit=400`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(symbol);
  return await res.json();
}

// ===== PIVOT =====
function pivotHighs(d,l){
  let a=[];
  for(let i=l;i<d.length-l;i++){
    let ok=true;
    for(let j=i-l;j<=i+l;j++){
      if(j!=i && d[j]>=d[i]) ok=false;
    }
    if(ok) a.push({i,val:d[i]});
  }
  return a;
}
function pivotLows(d,l){
  let a=[];
  for(let i=l;i<d.length-l;i++){
    let ok=true;
    for(let j=i-l;j<=i+l;j++){
      if(j!=i && d[j]<=d[i]) ok=false;
    }
    if(ok) a.push({i,val:d[i]});
  }
  return a;
}

// ===== REG =====
function reg(p){
  let n=p.length,sx=0,sy=0,sxy=0,sx2=0;
  p.forEach(x=>{
    sx+=x.i; sy+=x.val; sxy+=x.i*x.val; sx2+=x.i*x.i;
  });
  return (n*sxy-sx*sy)/(n*sx2-sx*sx);
}

// ===== DETECT =====
function detect(k){
  const h=k.map(x=>+x[2]);
  const l=k.map(x=>+x[3]);

  const pH=pivotHighs(h,4);
  const pL=pivotLows(l,4);

  if(pH.length<2||pL.length<2) return false;

  const sH=reg(pH);
  const sL=reg(pL);

  return sH<0 && sL>0;
}

// ===== MAIN =====
async function startScan(){
  const log = document.getElementById("log");
  log.textContent="⏳ Loading symbols...\n";

  let symbols;
  try{
    symbols = await loadSymbols();
  }catch{
    log.textContent+="⚠ API bị chặn → dùng fallback list\n";
    symbols = ["BTCUSDT","ETHUSDT","SOLUSDT","XRPUSDT","ADAUSDT","DOGEUSDT"];
  }

  log.textContent += `🚀 Scan ${symbols.length} coins\n`;

  let found=0;

  for(let i=0;i<symbols.length;i++){
    const sym = symbols[i];

    try{
      const data = await fetchKlines(sym);
      const slice = data.slice(-336); // 3–7 ngày

      if(detect(slice)){
        found++;
        log.textContent += `✅ ${sym}\n`;
      }

    }catch{
      log.textContent += `⚠ ${sym} lỗi\n`;
    }

    // progress
    if(i%10===0){
      log.textContent += `-- ${i}/${symbols.length} --\n`;
    }

    await new Promise(r=>setTimeout(r,120)); // chống ban
  }

  log.textContent += `\n🔥 DONE | Found: ${found}`;
}

</script>

</body>
</html>
